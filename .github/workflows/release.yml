name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-arm64:
    name: Build (macOS arm64)
    runs-on: macos-latest
    outputs:
      arm64_sha256: ${{ steps.sha.outputs.arm64_sha256 }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build arm64 binary
        run: bun build src/cli.tsx --compile --outfile clogex-macos-arm64 --target bun
      - name: Compute sha256
        id: sha
        run: echo "arm64_sha256=$(shasum -a 256 clogex-macos-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: binary-arm64
          path: clogex-macos-arm64

  build-x86_64:
    name: Build (macOS x86_64)
    runs-on: macos-13
    outputs:
      x86_64_sha256: ${{ steps.sha.outputs.x86_64_sha256 }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build x86_64 binary
        run: bun build src/cli.tsx --compile --outfile clogex-macos-x86_64 --target bun
      - name: Compute sha256
        id: sha
        run: echo "x86_64_sha256=$(shasum -a 256 clogex-macos-x86_64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: binary-x86_64
          path: clogex-macos-x86_64

  release:
    name: Create GitHub Release & Update Formula
    needs: [build-arm64, build-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binary-arm64
      - uses: actions/download-artifact@v4
        with:
          name: binary-x86_64

      - name: Generate sha256 files
        run: |
          echo "${{ needs.build-arm64.outputs.arm64_sha256 }}  clogex-macos-arm64" > clogex-macos-arm64.sha256
          echo "${{ needs.build-x86_64.outputs.x86_64_sha256 }}  clogex-macos-x86_64" > clogex-macos-x86_64.sha256

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            clogex-macos-arm64 \
            clogex-macos-x86_64 \
            clogex-macos-arm64.sha256 \
            clogex-macos-x86_64.sha256 \
            --title "clogex ${{ github.ref_name }}" \
            --generate-notes

      - name: Update Homebrew Formula
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ARM64_SHA="${{ needs.build-arm64.outputs.arm64_sha256 }}"
          X86_64_SHA="${{ needs.build-x86_64.outputs.x86_64_sha256 }}"

          git clone "https://x-access-token:${HOMEBREW_TAP_PAT}@github.com/bd-makers/homebrew-clogex.git" tap
          cd tap

          sed -i \
            -e "s/version \".*\"/version \"${VERSION}\"/" \
            -e "/on_arm/,/end/{s/sha256 \".*\"/sha256 \"${ARM64_SHA}\"/}" \
            -e "/on_intel/,/end/{s/sha256 \".*\"/sha256 \"${X86_64_SHA}\"/}" \
            Formula/clogex.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/clogex.rb
          git commit -m "chore: bump clogex to ${VERSION}"
          git push
