name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Build arm64 binary
        run: bun build src/cli.tsx --compile --outfile clogex-macos-arm64 --target bun

      - name: Compute sha256
        id: sha
        run: echo "arm64_sha256=$(shasum -a 256 clogex-macos-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Generate sha256 file
        run: echo "${{ steps.sha.outputs.arm64_sha256 }}  clogex-macos-arm64" > clogex-macos-arm64.sha256

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            clogex-macos-arm64 \
            clogex-macos-arm64.sha256 \
            --title "clogex ${{ github.ref_name }}" \
            --generate-notes

      - name: Update Formula
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ARM64_SHA="${{ steps.sha.outputs.arm64_sha256 }}"

          python3 - <<EOF
          import re

          with open("Formula/clogex.rb") as f:
              content = f.read()

          content = re.sub(r'version ".*"', f'version "{VERSION}"', content)
          content = re.sub(r'sha256 ".*"', f'sha256 "{ARM64_SHA}"', content)

          with open("Formula/clogex.rb", "w") as f:
              f.write(content)
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/clogex.rb
          git commit -m "chore: bump formula to ${VERSION}"
          git push
